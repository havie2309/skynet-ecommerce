<div class="card h-100 shadow-sm">
  <img [src]="product.imageUrl || 'https://placehold.co/400x200'" class="card-img-top"
       [alt]="product.name" style="height: 200px; object-fit: cover;">
  <div class="card-body d-flex flex-column">
    <h6 class="card-title">{{ product.name }}</h6>
    <p class="text-muted small mb-1">{{ product.description }}</p>
    <p class="fw-bold mt-auto">${{ product.price | number:'1.2-2' }}</p>
    <a [routerLink]="['/shop', product.id]" class="btn btn-sm btn-dark mt-2">
      View Details
    </a>
  </div>
</div>
