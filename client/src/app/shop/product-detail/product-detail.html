<div class="container mt-5">
  @if (product) {
    <div class="row">
      <div class="col-md-6">
        <img [src]="product.imageUrl || 'https://placehold.co/400x200'" 
             class="img-fluid rounded shadow" [alt]="product.name">
      </div>
      <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <h4 class="text-success">${{ product.price | number:'1.2-2' }}</h4>
        <p>{{ product.description }}</p>
        <p class="text-muted">Stock: {{ product.stockQuantity }}</p>
        <button class="btn btn-dark btn-lg mt-3">Add to Basket</button>
        <a routerLink="/shop" class="btn btn-outline-secondary btn-lg mt-3 ms-2">← Back</a>
      </div>
    </div>
  }
</div>
