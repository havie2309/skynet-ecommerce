<div class="container mt-4" style="max-width: 700px;">
  <h2 class="mb-4">My Profile</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <p><strong>Email:</strong> {{ authService.currentUser()?.email }}</p>
      <p><strong>Role:</strong> {{ authService.currentUser()?.role }}</p>

      <div class="d-flex gap-2 mt-4">
        <a routerLink="/orders" class="btn btn-dark">My Orders</a>
        <a routerLink="/shop" class="btn btn-outline-secondary">Continue Shopping</a>
      </div>
    </div>
  </div>
</div>
