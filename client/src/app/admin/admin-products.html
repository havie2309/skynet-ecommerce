<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Admin Products</h2>
    <a routerLink="/admin/products/new" class="btn btn-dark">Add Product</a>
  </div>

  @if (loading) {
    <p>Loading products...</p>
  } @else if (error) {
    <div class="alert alert-danger">{{ error }}</div>
  } @else {
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th style="width: 180px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (product of products; track product.id) {
            <tr>
              <td>
                <img
                  [src]="product.imageUrl || 'https://placehold.co/80x80'"
                  [alt]="product.name"
                  width="60"
                  height="60"
                  class="rounded"
                  style="object-fit: cover;">
              </td>
              <td>{{ product.name }}</td>
              <td>${{ product.price | number:'1.2-2' }}</td>
              <td>{{ product.stockQuantity }}</td>
              <td>
                <a [routerLink]="['/admin/products/edit', product.id]" class="btn btn-sm btn-outline-primary me-2">
                  Edit
                </a>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteProduct(product.id)">
                  Delete
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
