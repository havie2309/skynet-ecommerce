<div class="container mt-4" style="max-width: 700px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ isEditMode ? 'Edit Product' : 'Add Product' }}</h2>
    <a routerLink="/admin/products" class="btn btn-outline-secondary">Back</a>
  </div>

  @if (error) {
    <div class="alert alert-danger">{{ error }}</div>
  }

  @if (loading) {
    <p>Loading...</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" formControlName="name">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="4" formControlName="description"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input type="number" step="0.01" class="form-control" formControlName="price">
    </div>

    <div class="mb-3">
      <label class="form-label">Stock Quantity</label>
      <input type="number" class="form-control" formControlName="stockQuantity">
    </div>

    <div class="mb-3">
      <label class="form-label">Image URL</label>
      <input type="text" class="form-control" formControlName="imageUrl">
    </div>

    <button type="submit" class="btn btn-dark" [disabled]="loading">
      {{ isEditMode ? 'Update Product' : 'Create Product' }}
    </button>
  </form>
</div>
