<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" routerLink="/shop">🛒 Skinet</a>

  <div class="ms-auto d-flex align-items-center gap-3">

    <!-- Basket -->
    <a routerLink="/basket" class="btn btn-outline-light position-relative">
      Basket
      @if (basketService.itemCount() > 0) {
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          {{ basketService.itemCount() }}
        </span>
      }
    </a>

    <!-- Logged in -->
    @if (authService.currentUser()) {
      <a routerLink="/orders" class="btn btn-outline-light">My Orders</a>
      <span class="text-light">{{ authService.currentUser()!.email }}</span>
      <button class="btn btn-outline-danger" (click)="authService.logout()">
        Logout
      </button>
    } @else {
      <a routerLink="/login" class="btn btn-outline-light">Login</a>
      <a routerLink="/register" class="btn btn-light">Register</a>
    }
  </div>
</nav>
